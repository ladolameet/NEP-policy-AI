<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>GitaVanni - The Eternal Wisdom of the Bhagavad Gita</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            /* Color Palette for a Mystical/Premium Feel */
            --bg-deep: #0f0c29;
            /* Deep starry night */
            --bg-mid: #302b63;
            /* Twilight purple */
            --bg-light: #24243e;
            /* soft purple/blue */
            --accent-gold: #FFD700;
            --accent-orange: #FF7E5F;
            --accent-red: #FEB47B;

            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;

            --bot-bubble: rgba(48, 43, 99, 0.8);
            --user-bubble: linear-gradient(135deg, var(--accent-orange), var(--accent-red));
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        /* Beautiful Animated Gradient Background */
        body {
            display: flex;
            height: 100vh;
            background: linear-gradient(-45deg, var(--bg-deep), var(--bg-mid), var(--bg-light), #1a1a2e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        /* Glassmorphism Sidebar */
        .sidebar {
            width: 300px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .sidebar-header {
            padding: 30px 24px;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .om-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-orange));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 126, 95, 0.4);
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 24px;
            background: linear-gradient(to right, #fff, #ebd197);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .logo-text span {
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
            font-size: 13px;
            display: block;
            -webkit-text-fill-color: var(--accent-gold);
            margin-top: -2px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .new-chat-btn {
            margin: 24px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--accent-gold);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .new-chat-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .new-chat-btn:hover::before {
            left: 100%;
        }

        .new-chat-btn:hover {
            background: rgba(255, 215, 0, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.15);
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 0 15px;
        }

        .history-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 15px;
            padding-left: 15px;
            font-weight: 600;
        }

        .chat-item {
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            color: var(--text-muted);
            font-size: 14px;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .chat-item i {
            color: var(--accent-orange);
            font-size: 14px;
        }

        .chat-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: #fff;
            transform: translateX(4px);
        }

        .chat-item.active {
            background: linear-gradient(90deg, rgba(255, 126, 95, 0.15), transparent);
            border-left: 3px solid var(--accent-orange);
            color: #fff;
            font-weight: 500;
        }

        .sidebar-footer {
            padding: 24px;
            border-top: 1px solid var(--glass-border);
            font-size: 13px;
            font-family: 'Playfair Display', serif;
            color: var(--text-muted);
            text-align: center;
            font-style: italic;
            opacity: 0.7;
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        .main-header {
            padding: 20px 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 5;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-title h1 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        /* Welcome Screen */
        .welcome-screen {
            max-width: 800px;
            margin: auto;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-icon {
            width: 100px;
            height: 100px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 45px;
            color: var(--accent-gold);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
        }

        .welcome-screen h2 {
            font-family: 'Playfair Display', serif;
            font-size: 38px;
            color: #fff;
            margin-bottom: 15px;
            font-weight: 500;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .welcome-screen p {
            color: var(--text-muted);
            margin-bottom: 50px;
            font-size: 18px;
            font-weight: 300;
        }

        .suggestions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .suggestion-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            text-align: left;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .suggestion-card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(255, 126, 95, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(30%, -30%);
            transition: all 0.4s;
        }

        .suggestion-card:hover {
            border-color: rgba(255, 126, 95, 0.4);
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .suggestion-card:hover::after {
            transform: translate(10%, -10%) scale(1.5);
        }

        .suggestion-card i {
            font-size: 26px;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }

        .suggestion-card h3 {
            font-size: 17px;
            color: #fff;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .suggestion-card p {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 300;
            line-height: 1.5;
        }

        /* Messages */
        .message-wrapper {
            display: flex;
            width: 100%;
            margin-bottom: 10px;
            animation: messageSlide 0.4s ease forwards;
            opacity: 0;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-wrapper.user {
            justify-content: flex-end;
        }

        .message-wrapper.bot {
            justify-content: flex-start;
        }

        .message {
            max-width: 75%;
            padding: 20px 24px;
            border-radius: 24px;
            position: relative;
            line-height: 1.7;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .user .message {
            background: var(--user-bubble);
            color: #fff;
            border-bottom-right-radius: 6px;
        }

        .bot .message {
            background: var(--bot-bubble);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: #f8fafc;
            border-bottom-left-radius: 6px;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .user .message-header {
            color: rgba(255, 255, 255, 0.9);
        }

        .bot .message-header {
            color: var(--accent-gold);
        }

        .message-content {
            word-wrap: break-word;
            white-space: pre-wrap;
            font-weight: 300;
        }

        /* Beautify Verses inside bot messages */
        .message-content p {
            margin-bottom: 10px;
        }

        .message-content strong {
            font-weight: 600;
            color: #fff;
        }

        .message-actions {
            display: flex;
            gap: 12px;
            margin-top: 14px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .message-wrapper:hover .message-actions {
            opacity: 1;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.3);
        }

        .user .action-btn {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .user .action-btn:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        /* Modern Input Area */
        .input-area {
            padding: 24px 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            position: relative;
            z-index: 5;
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            padding: 8px 10px 8px 25px;
            transition: all 0.3s;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .input-wrapper:focus-within {
            border-color: rgba(255, 126, 95, 0.5);
            box-shadow: 0 0 20px rgba(255, 126, 95, 0.15), inset 0 2px 5px rgba(0, 0, 0, 0.1);
            background: rgba(0, 0, 0, 0.3);
        }

        .input-wrapper i.fa-feather-pointed {
            color: var(--accent-gold);
            font-size: 18px;
        }

        .input-wrapper input {
            flex: 1;
            padding: 14px 0;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 300;
            outline: none;
            color: #fff;
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .send-btn {
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-red));
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(255, 126, 95, 0.3);
        }

        .send-btn:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 6px 20px rgba(255, 126, 95, 0.5);
        }

        /* Stunning Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 18px 24px;
            background: var(--bot-bubble);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            width: fit-content;
            margin-bottom: 10px;
            animation: messageSlide 0.3s ease;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-gold);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
                opacity: 0.5;
            }

            40% {
                transform: scale(1);
                opacity: 1;
                box-shadow: 0 0 10px var(--accent-gold);
            }
        }

        /* Mobile Menu */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 1000;
            transition: background 0.2s;
        }

        .menu-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -320px;
                width: 300px;
                box-shadow: 20px 0 50px rgba(0, 0, 0, 0.5);
            }

            .sidebar.active {
                left: 0;
            }

            .menu-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .message {
                max-width: 90%;
                font-size: 15px;
            }

            .main-header {
                padding: 20px;
            }

            .chat-container {
                padding: 20px;
            }

            .input-area {
                padding: 15px 20px;
            }

            .suggestions-grid {
                grid-template-columns: 1fr;
            }

            .welcome-screen h2 {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>

    <button class="menu-toggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="om-icon"><i class="fas fa-om"></i></div>
                <div class="logo-text">
                    GitaVanni
                    <span>Spiritual Guide</span>
                </div>
            </div>
        </div>

        <div class="new-chat-btn" onclick="createNewChat()">
            <i class="fas fa-sparkles"></i>
            New Conversation
        </div>

        <div class="chat-history">
            <div class="history-title">Journeys</div>
            <div id="chatList"></div>
        </div>

        <div class="sidebar-footer">
            "Yoga is the journey of the self, through the self, to the self."
        </div>
    </div>

    <!-- Main Content -->
    <div class="main">
        <div class="main-header">
            <div class="header-title">
                <i class="fas fa-dharmachakra"
                    style="color: var(--accent-gold); font-size: 24px; animation: spin 20s linear infinite;"></i>
                <h1>GitaVanni 3.0</h1>
            </div>
            <div style="font-size: 13px; color: var(--text-muted); opacity: 0.8;">
                <i class="fas fa-circle-notch fa-spin"></i> Online
            </div>
        </div>

        <div class="chat-container" id="chatContainer"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <i class="fas fa-feather-pointed"></i>
                <input type="text" id="question"
                    placeholder="Ask about karma, dharma, or any verse (e.g., Chapter 2 verse 47)..."
                    autocomplete="off" />
                <button class="send-btn" onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <style>
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>

    <script>
        // Initialize chats from localStorage
        let chats = JSON.parse(localStorage.getItem("gitaChatsV3")) || {};
        let currentChatId = localStorage.getItem("currentChatIdV3") || null;

        const chatContainer = document.getElementById("chatContainer");
        const chatList = document.getElementById("chatList");
        const input = document.getElementById("question");

        // Suggestions array
        const suggestions = [
            {
                title: "Understanding Karma",
                desc: "What does the Gita say about performing my duties without attachment?",
                icon: "fa-scale-balanced",
                question: "What is Karma Yoga according to the Bhagavad Gita? How can I apply it?"
            },
            {
                title: "Finding Inner Peace",
                desc: "How can I calm an overactive mind in stressful times?",
                icon: "fa-leaf",
                question: "How does Lord Krishna advise Arjuna to control the restless mind?"
            },
            {
                title: "Specific Verses",
                desc: "Explore direct quotes from chapters.",
                icon: "fa-book-open",
                question: "Chapter 2 verse 47"
            },
            {
                title: "Overcoming Fear",
                desc: "Guidance on anxiety and facing difficulties.",
                icon: "fa-shield-halved",
                question: "What does the Gita say about fear, death, and the soul?"
            }
        ];

        // Show welcome screen
        function showWelcomeScreen() {
            const welcomeDiv = document.createElement("div");
            welcomeDiv.className = "welcome-screen";
            welcomeDiv.id = "welcomeScreen";

            let suggestionsHtml = '';
            suggestions.forEach(s => {
                suggestionsHtml += `
                    <div class="suggestion-card" onclick="askSuggestion('${s.question.replace(/'/g, "\\'")}')">
                        <i class="fas ${s.icon}"></i>
                        <h3>${s.title}</h3>
                        <p>${s.desc}</p>
                    </div>
                `;
            });

            welcomeDiv.innerHTML = `
                <div class="welcome-icon">
                    <i class="fas fa-om"></i>
                </div>
                <h2>Awaken Your Inner Truth</h2>
                <p>Seek guidance, wisdom, and clarity from the timeless dialogue between Arjuna and Krishna.</p>
                <div class="suggestions-grid">
                    ${suggestionsHtml}
                </div>
            `;

            chatContainer.appendChild(welcomeDiv);
        }

        // Ask suggestion
        window.askSuggestion = function (question) {
            input.value = question;
            sendMessage();
        };

        // Chat Management
        function createNewChat() {
            const id = "chat_" + Date.now();
            chats[id] = [];
            currentChatId = id;
            saveChats();
            renderChatList();
            renderChat();

            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('active');
            }
        }

        function saveChats() {
            localStorage.setItem("gitaChatsV3", JSON.stringify(chats));
            localStorage.setItem("currentChatIdV3", currentChatId);
        }

        function renderChatList() {
            chatList.innerHTML = "";

            if (Object.keys(chats).length === 0) {
                chatList.innerHTML = '<div style="color: rgba(255,255,255,0.4); text-align: center; padding: 20px; font-size: 13px;">No journeys yet</div>';
                return;
            }

            Object.keys(chats).reverse().forEach(id => {
                const div = document.createElement("div");
                div.className = "chat-item" + (id === currentChatId ? " active" : "");

                const firstMsg = chats[id][0]?.content || "New Conversation";
                const icon = chats[id][0] ? 'fa-comment-dots' : 'fa-sparkles';

                let snip = firstMsg.substring(0, 22);
                if (firstMsg.length > 22) snip += "...";

                div.innerHTML = `<i class="fas ${icon}"></i><span>${snip}</span>`;

                div.onclick = () => {
                    currentChatId = id;
                    saveChats();
                    renderChatList();
                    renderChat();

                    if (window.innerWidth <= 768) {
                        document.getElementById('sidebar').classList.remove('active');
                    }
                };
                chatList.appendChild(div);
            });
        }

        function renderChat() {
            chatContainer.innerHTML = "";

            if (!currentChatId || !chats[currentChatId] || chats[currentChatId].length === 0) {
                showWelcomeScreen();
                return;
            }

            chats[currentChatId].forEach(msg => {
                addMessage(msg.content, msg.role, false);
            });
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function formatMessage(content) {
            let formattedContent = content;
            if (content.includes('Chapter') || content.includes('verse') || content.includes('Verse')) {
                formattedContent = content.replace(/(Chapter \d+,\s*Verse \d+)/gi, '\n<strong style="color:var(--accent-gold); font-size:18px;">📖 $1</strong>\n');
            }
            // Basic markdown handling for bolding
            formattedContent = formattedContent.replace(/\*\*(.*?)\*\*/g, '<strong style="color:#fff;">$1</strong>');
            return formattedContent;
        }

        function addMessage(content, role, animate = true) {
            const wrapper = document.createElement("div");
            wrapper.className = `message-wrapper ${role}`;
            if (!animate) wrapper.style.animation = "none";

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const formattedContent = formatMessage(content);

            const actions = role === 'bot' ? `
                <div class="message-actions">
                    <button class="action-btn" onclick="copyMessage(this)"><i class="fas fa-copy"></i> Copy</button>
                    <button class="action-btn" onclick="shareMessage(this)"><i class="fas fa-share-nodes"></i> Share</button>
                </div>
            ` : '';

            wrapper.innerHTML = `
                <div class="message">
                    <div class="message-header">
                        <i class="fas ${role === 'user' ? 'fa-user' : 'fa-om'}"></i>
                        <span>${role === 'user' ? 'You' : 'Gita Wisdom'}</span>
                        <span style="margin-left: auto; font-size: 11px; opacity: 0.5; font-weight:300;">${time}</span>
                    </div>
                    <div class="message-content">${formattedContent}</div>
                    ${actions}
                </div>
            `;

            chatContainer.appendChild(wrapper);
            if (animate) {
                setTimeout(() => { chatContainer.scrollTop = chatContainer.scrollHeight; }, 10);
            }
        }

        window.copyMessage = function (btn) {
            const content = btn.closest('.message').querySelector('.message-content').innerText;
            navigator.clipboard.writeText(content);
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
            setTimeout(() => { btn.innerHTML = originalText; }, 2000);
        }

        window.shareMessage = function (btn) {
            const content = btn.closest('.message').querySelector('.message-content').innerText;
            if (navigator.share) {
                navigator.share({ title: 'GitaVanni Wisdom', text: content });
            } else {
                alert('📿 Copy this text to share:\n\n' + content);
            }
        }

        function showTypingIndicator() {
            const indicator = document.createElement("div");
            indicator.className = "typing-indicator";
            indicator.id = "typingIndicator";
            for (let i = 0; i < 3; i++) {
                const dot = document.createElement("div");
                dot.className = "typing-dot";
                indicator.appendChild(dot);
            }
            chatContainer.appendChild(indicator);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const question = input.value.trim();
            if (!question) return;

            const welcomeScreen = document.getElementById('welcomeScreen');
            if (welcomeScreen) welcomeScreen.remove();

            if (!currentChatId) createNewChat();

            chats[currentChatId].push({ role: "user", content: question });
            addMessage(question, "user");
            input.value = "";

            saveChats();
            renderChatList();
            showTypingIndicator();

            try {
                // Pointing to FastAPI Backend
                const response = await fetch("http://127.0.0.1:8000/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question: question })
                });

                if (!response.ok) throw new Error('Network Issue');

                const data = await response.json();
                document.getElementById("typingIndicator")?.remove();

                chats[currentChatId].push({ role: "bot", content: data.answer });
                addMessage(data.answer, "bot");

                saveChats();
            } catch (err) {
                document.getElementById("typingIndicator")?.remove();
                addMessage("⚠️ The divine server is unreachable. Ensure the FastAPI backend is running on http://127.0.0.1:8000.", "bot");
                console.error(err);
            }
        }

        window.toggleSidebar = function () {
            document.getElementById('sidebar').classList.toggle('active');
        }

        input.addEventListener("keypress", function (e) {
            if (e.key === "Enter") sendMessage();
        });

        if (!currentChatId || Object.keys(chats).length === 0) {
            createNewChat();
        } else {
            renderChatList();
            renderChat();
        }

        document.addEventListener('click', function (event) {
            const sidebar = document.getElementById('sidebar');
            const menuToggle = document.querySelector('.menu-toggle');

            if (window.innerWidth <= 768) {
                if (!sidebar.contains(event.target) && !menuToggle.contains(event.target) && sidebar.classList.contains('active')) {
                    sidebar.classList.remove('active');
                }
            }
        });
    </script>
</body>

</html>
